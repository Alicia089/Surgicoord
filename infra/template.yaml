AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: SurgiCoord â€” AI surgical coordination API

Parameters:
  Environment:
    Type: String
    Default: staging
    AllowedValues: [staging, production]
  ImageUri:
    Type: String
    Description: ECR image URI to deploy

Globals:
  Function:
    Timeout: 120
    MemorySize: 512

Resources:

  SurgiCoordFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "SurgiCoord-api-${Environment}"
      PackageType: Image
      ImageUri: !Ref ImageUri
      Description: SurgiCoord surgery briefing agent â€” FastAPI on Lambda
      Environment:
        Variables:
          ANTHROPIC_API_KEY: "{{resolve:secretsmanager:SurgiCoord/anthropic-key}}"
          SurgiCoord_API_KEY: "{{resolve:secretsmanager:SurgiCoord/api-secret}}"
      Events:
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref SurgiCoordHttpApi
            Path: /
            Method: ANY
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref SurgiCoordHttpApi
            Path: /{proxy+}
            Method: ANY
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            - "*"
          AllowMethods:
            - GET
            - POST
          AllowHeaders:
            - Content-Type
            - X-API-Key
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource:
              - !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:SurgiCoord/*"

  SurgiCoordHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
        AllowHeaders:
          - Content-Type
          - X-API-Key

  SurgiCoordLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/SurgiCoord-api-${Environment}"
      RetentionInDays: 90

Outputs:
  ApiUrl:
    Description: SurgiCoord API base URL
    Value: !Sub "https://${SurgiCoordHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
    Export:
      Name: !Sub "SurgiCoordApiUrl-${Environment}"

  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt SurgiCoordFunction.Arn

  FunctionUrl:
    Description: Lambda Function URL (no timeout â€” use this for /brief)
    Value: !GetAtt SurgiCoordFunctionUrl.FunctionUrl
    Export:
      Name: !Sub "SurgiCoordFunctionUrl-${Environment}"
